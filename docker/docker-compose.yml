version: '3.8'

services:
  # ── Databases ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: disaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: disaster_db
      POSTGRES_USER: disaster_user
      POSTGRES_PASSWORD: DisasterPass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disaster_user -d disaster_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disaster-net

  mongodb:
    image: mongo:7-jammy
    container_name: disaster-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: disaster_logs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disaster-net

  # ── Application ────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: disaster-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 5000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: disaster_db
      POSTGRES_USER: disaster_user
      POSTGRES_PASSWORD: DisasterPass123
      MONGO_URI: mongodb://mongodb:27017/disaster_logs
      JWT_SECRET: change-me-in-production-32chars-min
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change-me-refresh-secret-32chars
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - disaster-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: disaster-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - disaster-net

volumes:
  postgres_data:
  mongo_data:
  uploads_data:
  logs_data:

networks:
  disaster-net:
    driver: bridge
